# @package _global_
# Single-shot diffusion — comparable to n2_l10_gpt2_30iter_dmax170 and
# n2_l10_diffusion_absorbing_matched_30iter_dmax170:
#   - 30 iterations, shots=100k, max_dim=170
#   - joins n2-L10-dmax170-comparison so charts overlay with those runs
defaults:
  - override /molecule: n2
  - override /model: diffusion_singleshot

exp_tag: n2-L10-diffusion-singleshot-30iter-dmax170
ngates: 10
wandb:
  project: ${project.name}
  name: ${exp_tag}
  dir: ${output}
  group: n2-L10-dmax170-comparison
  tags: ["n2", "L10", "30iter", "diffusion", "singleshot", "USS", "dmax170"]
trainer:
  max_iters: 30
  num_samples: 10
  batch_size: 10
  warmup_size: 10
  buffer_size: 10
  step_per_epoch: 30
  load_checkpoint: false
  checkpoint_every_n_iters: 1
  precision: 32-true
  warm_start_checkpoint: null
sampler:
  shots: 100_000
qsci:
  max_dim: 170
