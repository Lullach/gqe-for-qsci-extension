# @package _global_
# Single-shot diffusion model — N2 (10e, 8o), 100 iterations.
#
# Uses paper-comparable shot count (1000/circuit) but no max_dim constraint.
# Joins n2-L10-paper-settings so charts overlay with GPT-2 and absorbing runs.
#
# To warm-start from a trained absorbing checkpoint, add:
#   trainer.warm_start_checkpoint=/path/to/absorbing.ckpt
# on the command line or set it in this file.
defaults:
  - override /molecule: n2
  - override /model: diffusion_singleshot

exp_tag: n2-L10-diffusion-singleshot-100iter
ngates: 10
wandb:
  project: ${project.name}
  name: ${exp_tag}
  dir: ${output}
  group: n2-L10-paper-settings
  tags: ["n2", "L10", "100iter", "diffusion", "singleshot", "USS"]
trainer:
  max_iters: 100
  num_samples: 10
  batch_size: 10
  warmup_size: 10
  buffer_size: 10
  step_per_epoch: 30
  load_checkpoint: false
  checkpoint_every_n_iters: 5
  precision: 32-true
  warm_start_checkpoint: null   # set to .ckpt path to enable warm-start
sampler:
  shots: 1_000
# qsci.max_dim intentionally not set — uses default (2000)
