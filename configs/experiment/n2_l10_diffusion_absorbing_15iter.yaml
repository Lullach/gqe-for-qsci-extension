# @package _global_
defaults:
  - override /molecule: n2
  - override /model: diffusion_absorbing

exp_tag: n2-L10-diffusion-absorbing-15iter
ngates: 10
wandb:
  project: ${project.name}
  name: ${exp_tag}
  dir: ${output}
  group: n2-L10-policy-comparison
  tags: ["n2", "L10", "15iter", "diffusion", "absorbing-diffusion"]
trainer:
  max_iters: 15
  num_samples: 10
  batch_size: 10
  warmup_size: 10
  buffer_size: 10
  step_per_epoch: 30
  load_checkpoint: false
  checkpoint_every_n_iters: 1
  precision: 32-true
sampler:
  shots: 100_000
qsci:
  max_dim: 2000
